<nav class="sidebar-nav bg-dark shadow-sm d-flex flex-column">
    <a class="navbar-brand text-white px-3 py-3"><strong>{{site.data.profile.navbar_name}}</strong></a>
    <button class="navbar-toggler d-sm-none text-white px-3" style="font-size: 1em; text-align:left;" type="button" data-toggle="collapse" data-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
        <i class="fas fa-map"></i> Menu
    </button>

    <div class="collapse d-sm-block" id="navbarResponsive">
        <ul class="nav flex-column px-3">
            {% for item in site.data.navigation.pages %}
            <li class="nav-item {% if item.name == page.navbar_title %}active{% endif %}">
                <a class="nav-link text-light" href="{{ item.url | relative_url }}">{{ item.name }}</a>
            </li>
            {% endfor %}
        </ul>
    </div>
</nav>
