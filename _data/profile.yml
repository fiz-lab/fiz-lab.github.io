short_bio_text_justify: false
short_bio: >-
  <p>
    Welcome to <strong>Future Intelligent Zystems Laboratory (FIZLab)</strong>!
    We focus on developing future wireless systems. Our key objectives include designing advanced wireless communication technologies,
    cultivating talent through next-generation wireless network exploration, and contributing to academia and industry.
  </p>
  <p>
    Current research interests encompass <strong>6G systems</strong>, <strong>intelligent wireless networking</strong>,
    and <strong>connected intelligent systems</strong>.
  </p>
  <p>
    <i class="fas fa-bullhorn"></i> <strong>FIZLab is actively seeking motivated and passionate students!</strong>
    We recruit undergraduate research interns and graduate students interested in wireless communication, sensing, and artificial intelligence.
    Contact: hhnoh [at] hanbat (.) ac (.) kr
  </p>

